name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib

    - name: Build ISO
      run: make all

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: crispy-funicular
        path: dist/crispy-funicular.iso
